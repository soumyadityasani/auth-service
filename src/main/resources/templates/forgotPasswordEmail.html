<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Update</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:20px;">
    <tr>
        <td align="center">

            <!-- Card Container -->
            <table width="420" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; border-radius:12px; padding:30px;
                          box-shadow:0 6px 20px rgba(0,0,0,0.08);">

                <!-- Header -->
                <tr>
                    <td align="center" style="padding-bottom:15px;">
                        <h2 style="margin:0; color:#2c3e50;">🔐 Password Updated</h2>
                    </td>
                </tr>

                <!-- Message -->
                <tr>
                    <td style="text-align:center; color:#555; font-size:14px;">
                        <p style="margin:0 0 15px;">
                            Your password has been updated successfully.
                        </p>
                    </td>
                </tr>

                <!-- Password Box -->
                <tr>
                    <td align="center" style="padding:15px 0;">
                        <div style="
                            display:inline-block;
                            background:#f1f5ff;
                            color:#2d5bff;
                            font-size:20px;
                            font-weight:bold;
                            letter-spacing:2px;
                            padding:12px 20px;
                            border-radius:8px;
                            border:1px dashed #2d5bff;
                        ">
                            <span th:text="${password}">password</span>
                        </div>
                    </td>
                </tr>

                <!-- Warning -->
                <tr>
                    <td style="text-align:center; color:#888; font-size:13px;">
                        <p style="margin:10px 0;">
                            ⚠️ If you didn’t request this change, please secure your account immediately.
                        </p>
                    </td>
                </tr>


            </table>

            <!-- Footer -->
            <p style="font-size:12px; color:#aaa; margin-top:15px;">
                © 2026 SMART ATTENDANCE SYSTEM • Secure Auth System
            </p>

        </td>
    </tr>
</table>

</body>
</html>
